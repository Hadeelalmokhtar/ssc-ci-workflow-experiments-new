name: SSC Build Pipeline

on:
  push:
    branches: ["main"]

  workflow_dispatch:
    inputs:
      package_file:
        description: "Enter package file name (e.g. animejs-3.2.1.tgz)"
        required: true
        default: "animejs-3.2.1.tgz"

permissions:
  contents: write

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:

    # ================= Checkout =================
    - name: Checkout Repository
      uses: actions/checkout@v4

    # ================= Setup Python =================
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    # ================= Install Dependencies =================
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # ================= Download NLTK =================
    - name: Download NLTK Data
      run: |
        python - <<EOF
        import nltk
        nltk.download("stopwords")
        EOF

    # ================= Detect Package =================
    - name: Detect Package
      id: detect_pkg
      run: |

        PACKAGE=""

        echo "Checking trigger type..."

        # ---------- manual run ----------
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          PACKAGE="${{ github.event.inputs.package_file }}"
        fi

        # ---------- push detection ----------
        if [ -z "$PACKAGE" ]; then

          echo "Checking changed files..."

          FILES=$(git diff --name-only HEAD~1 HEAD)

          for f in $FILES; do
            if [[ "$f" == *.tgz ]] || [[ "$f" == *.tar.gz ]]; then
              PACKAGE="$f"
              break
            fi
          done

        fi

        if [ -z "$PACKAGE" ]; then
          echo "No package detected"
          echo "skip_pipeline=true" >> $GITHUB_OUTPUT
          exit 0
        fi

        echo "Package detected: $PACKAGE"

        echo "package_path=$PACKAGE" >> $GITHUB_OUTPUT
        echo "skip_pipeline=false" >> $GITHUB_OUTPUT

    # ================= ML Security Gate =================
    - name: ML Security Gate
      id: ml_scan
      if: steps.detect_pkg.outputs.skip_pipeline == 'false'
      continue-on-error: true
      run: |
        export PYTHONPATH=$PYTHONPATH:$(pwd)
        python -m scripts.run_analysis "${{ steps.detect_pkg.outputs.package_path }}"

    # ================= Move to Decoy =================
    - name: Move to Decoy
      if: steps.detect_pkg.outputs.skip_pipeline == 'false' && steps.ml_scan.outcome == 'failure'
      run: |
        mkdir -p packages/decoy
        mv "${{ steps.detect_pkg.outputs.package_path }}" \
           packages/decoy/package_${{ github.run_number }}.tgz

    # ================= Build Sandbox =================
    - name: Build Sandbox Image
      if: steps.detect_pkg.outputs.skip_pipeline == 'false' && steps.ml_scan.outcome == 'failure'
      run: |
        docker build -t ssc-sandbox -f sandbox/Dockerfile .

    # ================= Dynamic Analysis =================
    - name: Run Dynamic Analysis
      if: steps.detect_pkg.outputs.skip_pipeline == 'false' && steps.ml_scan.outcome == 'failure'
      continue-on-error: true
      run: |
        docker run --rm \
          -v ${{ github.workspace }}:/app \
          ssc-sandbox \
          python sandbox/runner.py \
          packages/decoy/package_${{ github.run_number }}.tgz

    # ================= Publish Benign =================
    - name: Publish Package
      if: steps.detect_pkg.outputs.skip_pipeline == 'false' && steps.ml_scan.outcome == 'success'
      run: |
        mkdir -p packages/releases
        mv "${{ steps.detect_pkg.outputs.package_path }}" \
           packages/releases/package_${{ github.run_number }}.tgz

    # ================= Commit Results =================
    - name: Commit Results
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        git add packages/ || true
        git add decoy_logs/ || true

        git commit -m "SSC pipeline result (run ${{ github.run_number }})" || echo "Nothing to commit"

        git pull --rebase origin main || true
        git push origin main
