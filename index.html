<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>SSC Threat Intelligence Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vis-network@9.1.2/dist/vis-network.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/vis-network/styles/vis-network.min.css" rel="stylesheet">

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
padding:30px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(400px,1fr));
gap:20px;
}

.list{
background:#0b1220;
padding:10px;
border-radius:8px;
}

.item{
padding:5px;
border-bottom:1px solid #333;
}

.malicious{color:#ff4d4d;font-weight:bold}
.clean{color:#4dff88;font-weight:bold}

#attackGraph{
height:300px;
background:#0b1220;
border-radius:10px;
}

</style>

</head>

<body>

<h1>SSC Threat Intelligence Dashboard</h1>

<div class="card">

Package: <span id="pkg"></span><br>
Run ID: <span id="run"></span><br>
Behavior Score: <span id="score"></span><br>
Malware Family: <span id="family"></span>

</div>

<div class="grid">

<div class="card">
<h3>IOC Extraction</h3>
<div id="ioc" class="list"></div>
</div>

<div class="card">
<h3>Commands</h3>
<div id="cmd" class="list"></div>
</div>

<div class="card">
<h3>Network</h3>
<div id="net" class="list"></div>
</div>

<div class="card">
<h3>DNS Activity</h3>
<div id="dns" class="list"></div>
</div>

<div class="card">
<h3>Attack Graph</h3>
<div id="attackGraph"></div>
</div>

</div>

<script>

async function load(){

const r=await fetch("decoy_logs/latest.json?t="+Date.now())
const data=await r.json()

document.getElementById("pkg").textContent=data.package.name
document.getElementById("run").textContent=data.run_id
document.getElementById("score").textContent=data.behavior_score
document.getElementById("family").textContent=data.malware_family

renderIOC(data)
renderCommands(data)
renderNetwork(data)
renderDNS(data)
renderGraph(data)

}

function renderIOC(data){

let panel=document.getElementById("ioc")

data.ioc.ips.forEach(i=>{
panel.innerHTML+=`<div class="item">IP: ${i}</div>`
})

}

function renderCommands(data){

let panel=document.getElementById("cmd")

data.commands_detected.forEach(c=>{
panel.innerHTML+=`<div class="item">${c}</div>`
})

}

function renderNetwork(data){

let panel=document.getElementById("net")

data.network_activity.details.forEach(n=>{
panel.innerHTML+=`<div class="item">${n.ip}:${n.port}</div>`
})

}

function renderDNS(data){

let panel=document.getElementById("dns")

data.dns_activity.forEach(d=>{
panel.innerHTML+=`<div class="item">${d}</div>`
})

}

function renderGraph(data){

let container=document.getElementById("attackGraph")

let nodes=new vis.DataSet(data.attack_graph.nodes)
let edges=new vis.DataSet(data.attack_graph.edges)

new vis.Network(container,{nodes:nodes,edges:edges},{})

}

load()

</script>

</body>
</html>
